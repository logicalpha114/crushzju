
<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">

    <title>测试注册</title>

</head>

<body>

    <h1>测试注册</h1>

    <form id="testForm">

        <input type="text" id="studentId" placeholder="学号" style="width:200px; padding:5px; margin:5px;"><br>

        <input type="text" id="nickname" placeholder="昵称" style="width:200px; padding:5px; margin:5px;"><br>

        <input type="password" id="password" placeholder="密码" style="width:200px; padding:5px; margin:5px;"><br>

        <button type="submit" style="padding:5px 20px; margin:5px;">注册</button>

    </form>

    <div id="result" style="margin:10px; padding:10px; border:1px solid #ccc;"></div>

    

    <script>

        document.getElementById('testForm').addEventListener('submit', async function(e) {

            e.preventDefault();

            const studentId = document.getElementById('studentId').value;

            const nickname = document.getElementById('nickname').value;

            const password = document.getElementById('password').value;

            

            if (!studentId || !nickname || !password) {

                document.getElementById('result').innerText = '请填写完整信息';

                return;

            }

            

            document.getElementById('result').innerText = '提交中...';

            

            const res = await fetch('/api/register', {

                method: 'POST',

                headers: {'Content-Type': 'application/json'},

                body: JSON.stringify({

                    student_id: studentId,

                    nickname: nickname,

                    password: password,

                    confirm_password: password,

                    phone: '13800138000',

                    gender: '男',

                    orientation: 'straight',

                    sub_orientation: '',

                    grade: '大一',

                    birthday: '2000-01-01'

                })

            });

            const data = await res.json();

            document.getElementById('result').innerText = JSON.stringify(data);

        });

    </script>

</body>

</html>
