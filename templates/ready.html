<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>准备 | CrushZJU</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- 网站背景图 - 在此处添加背景图 -->
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 600px; text-align: center;">
            <h1 class="title">✨ 准备好开启你的心灵之旅了吗？ ✨</h1>
            <p style="margin: 40px 0; font-size: 16px; line-height: 1.8;">
                请在填完以下心理问卷之后，<br>
                找到和你在茫茫人海之中共振的那个TA
            </p>
            <div style="cursor: pointer;" id="startBtn">
                <p style="font-size: 14px; color: #2c5aa6;">Touch to Start</p>
                <p style="font-size: 12px; color: #999;">↓</p>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('startBtn').addEventListener('click', () => {
            window.location.href = '/survey';
        });
    </script>
</body>
</html>
